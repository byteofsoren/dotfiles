# === NEW REUSABLE TASK FILE: playbooks/tasks/install-github-credentials.yml ===
---
- name: Configure global Git user name and email
  git_config:
    scope: global
    name: "{{ item.name }}"
    value: "{{ item.value }}"
  loop:
    - { name: user.name, value: "{{ git_user_name }}" }
    - { name: user.email, value: "{{ git_user_email }}" }
  when: item.value is defined and item.value | length > 0

- name: Set Git credential helper to 'store' (stores token in ~/.git-credentials)
  git_config:
    scope: global
    name: credential.helper
    value: store

- name: Approve GitHub credentials (injects PAT securely — runs every time but is harmless)
  shell: |
    set -o pipefail -e
    cat <<EOF | git credential approve
    protocol=https
    host=github.com
    username={{ github_username }}
    password={{ github_token }}
    EOF
  args:
    executable: /bin/bash # <- required for pipefail to work
  no_log: true          # never print the token in logs
  changed_when: false   # idempotent — no unnecessary "changed" reports
